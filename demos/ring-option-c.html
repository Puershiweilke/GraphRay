<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>状态环方案 C · 等分扇区 + 逐关刻度（动效版）</title>
<style>
  html,body{margin:0;height:100%;background:#1A1A1A;color:#cfcfcf;font-family:'Segoe UI','Microsoft YaHei',sans-serif;}
  .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:24px 0;box-sizing:border-box;}
  h2{font-weight:400;letter-spacing:2px;color:#9EFF00;margin:0 0 6px;font-size:20px;}
  .sub{font-size:13px;color:#8a8a8a;margin-bottom:14px;}
  .legend{display:flex;gap:20px;margin-top:16px;font-size:13px;color:#bbb;}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:6px;vertical-align:-1px;}
  /* —— 动效 —— */
  .tick{transform-box:fill-box;transform-origin:center;animation:pop .45s cubic-bezier(.2,.8,.3,1.25) both;}
  @keyframes pop{0%{opacity:0;transform:scale(.05)}60%{opacity:1}100%{opacity:1;transform:scale(1)}}
  .pulse{animation:pop .45s cubic-bezier(.2,.8,.3,1.25) both, breathe 1.8s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:1}50%{opacity:.42}}
  .pulse{filter:drop-shadow(0 0 3px #EF9F27);}
  .bnd{transform-box:view-box;transform-origin:230px 230px;transform:scaleY(0);animation:grow .5s ease-out both;}
  @keyframes grow{to{transform:scaleY(1)}}
  .fade{opacity:0;animation:fin .6s ease-out both;}
  @keyframes fin{to{opacity:1}}
  .sweep{transform-box:view-box;transform-origin:230px 230px;animation:sweep 7s linear infinite;mix-blend-mode:screen;pointer-events:none;}
  @keyframes sweep{to{transform:rotate(360deg)}}
  .core-glow{animation:cg 2.6s ease-in-out infinite;}
  @keyframes cg{0%,100%{opacity:.55}50%{opacity:1}}
</style>
</head>
<body>
<div class="wrap">
  <h2>方案 C · 等分扇区 + 逐关刻度</h2>
  <div class="sub">4 扇区 = 4 章 · 每扇区 12 刻度 = 12 关 · 逐格点亮 · 含动效</div>
  <svg id="ring" width="460" height="460" viewBox="0 0 460 460">
    <defs>
      <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#9EFF00" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="#9EFF00" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#9EFF00" stop-opacity="0.20"/>
        <stop offset="100%" stop-color="#9EFF00" stop-opacity="0"/>
      </radialGradient>
    </defs>
  </svg>
  <div class="legend">
    <span><i style="background:#9EFF00"></i>已通关卡</span>
    <span><i style="background:#EF9F27"></i>本章待通</span>
    <span><i style="background:#1A1A1A;border:1.5px solid #3A3A3A"></i>锁定关</span>
  </div>
</div>
<script>
const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('ring');
const cx=230,cy=230,R=150;
const C={green:'#9EFF00',amber:'#EF9F27',gray:'#3A3A3A',track:'#262626'};
const chapters=[{n:'第一章',done:12,total:12,state:'done'},{n:'第二章',done:5,total:12,state:'current'},{n:'第三章',done:0,total:12,state:'locked'},{n:'第四章',done:0,total:12,state:'locked'}];
const done=chapters.reduce((s,c)=>s+c.done,0),total=chapters.reduce((s,c)=>s+c.total,0),cc=chapters.filter(c=>c.state==='done').length;
function pt(r,deg){const a=deg*Math.PI/180;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}

// 雷达扫描光束（底层，随终端旋转）
(function(){
  const a0=-14,a1=14;
  const[x1,y1]=pt(R,a0),[x2,y2]=pt(R,a1);
  const p=document.createElementNS(NS,'path');
  p.setAttribute('d',`M ${cx} ${cy} L ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2} Z`);
  p.setAttribute('fill','url(#sweepGrad)');
  p.setAttribute('class','sweep');
  svg.appendChild(p);
})();

// 底层整圈轨道
(function(){
  const[x1,y1]=pt(R,0),[x2,y2]=pt(R,359.999);
  const p=document.createElementNS(NS,'path');
  p.setAttribute('d',`M ${x1} ${y1} A ${R} ${R} 0 1 1 ${x2} ${y2}`);
  p.setAttribute('stroke',C.track);p.setAttribute('stroke-width',2);p.setAttribute('fill','none');
  p.setAttribute('class','fade');
  svg.appendChild(p);
})();

// 中心辉光
(function(){
  const c=document.createElementNS(NS,'circle');
  c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',70);
  c.setAttribute('fill','url(#coreGlow)');c.setAttribute('class','core-glow fade');
  svg.appendChild(c);
})();

let acc=0;const seg=90;let gt=0;const step=0.022;
chapters.forEach((ch,i)=>{
  const s=acc,e=acc+seg;
  // 章节边界线（从中心生长）
  const g=document.createElementNS(NS,'g');
  g.setAttribute('transform',`rotate(${s} ${cx} ${cy})`);
  const l=document.createElementNS(NS,'line');
  l.setAttribute('x1',cx);l.setAttribute('y1',cy-R+22);l.setAttribute('x2',cx);l.setAttribute('y2',cy-R-22);
  l.setAttribute('stroke','#555');l.setAttribute('stroke-width',1.5);
  l.setAttribute('class','bnd');l.style.animationDelay=(i*0.12)+'s';
  g.appendChild(l);svg.appendChild(g);
  // 逐关刻度（顺时针逐格点亮）
  for(let k=0;k<ch.total;k++){
    const ta=s+(k+0.5)/ch.total*seg;
    const[dx,dy]=pt(R,ta);
    let col,hollow=false;
    if(ch.state==='locked'){col=C.gray;hollow=true;}
    else if(k<ch.done){col=C.green;}
    else{col=C.amber;}
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',dx);c.setAttribute('cy',dy);c.setAttribute('r',hollow?3.5:4);
    c.setAttribute('fill',hollow?'none':col);c.setAttribute('stroke',col);c.setAttribute('stroke-width',hollow?1.5:0);
    if(hollow){c.setAttribute('class','tick');}
    else if(col===C.amber){c.setAttribute('class','tick pulse');c.style.animationDelay=`${gt*step}s, ${gt*step+0.45}s`;}
    else{c.setAttribute('class','tick');c.style.animationDelay=(gt*step)+'s';}
    svg.appendChild(c);
    gt++;
  }
  // 章号（淡入）
  const[lx,ly]=pt(R+32,s+seg/2);
  const lab=document.createElementNS(NS,'text');
  lab.setAttribute('x',lx);lab.setAttribute('y',ly+5);lab.setAttribute('fill','#aaa');
  lab.setAttribute('font-size','15');lab.setAttribute('text-anchor','middle');
  lab.textContent=(i+1);lab.setAttribute('class','fade');lab.style.animationDelay=(0.2+i*0.12)+'s';
  svg.appendChild(lab);
  acc=e;
});

// 中心数字：0 → done 计数
function txt(y,size,color,fw){const e=document.createElementNS(NS,'text');e.setAttribute('x',cx);e.setAttribute('y',y);e.setAttribute('fill',color);e.setAttribute('font-size',size);e.setAttribute('text-anchor','middle');e.setAttribute('font-weight',fw||400);return e;}
const numEl=txt(cy+14,42,C.green,700);numEl.setAttribute('class','fade');numEl.style.animationDelay='0.3s';svg.appendChild(numEl);
const subEl=txt(cy+40,15,'#aaa');subEl.textContent='已通 '+cc+' 章';subEl.setAttribute('class','fade');subEl.style.animationDelay='0.5s';svg.appendChild(subEl);
let cur=0;const t0=performance.now(),dur=1200;
(function count(up){const p=Math.min((performance.now()-t0)/dur,1);const e=1-Math.pow(1-p,3);
  numEl.textContent=Math.round(e*done)+' / '+total;
  if(p<1)requestAnimationFrame(count);})(0);
</script>
</body></html>
