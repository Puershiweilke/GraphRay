<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphRay · 函数射线</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&family=Inter:wght@400;500;700&family=ZCOOL+QingKe+HuangYou&display=swap');

  :root {
    --bg: #1A1A1A;
    --neon: #9EFF00;
    --neon-r: 0.62;
    --neon-g: 1;
    --neon-b: 0;
    --card-dark: #242424;
    --card-border: #3D3D3D;
    --card-border-rot: #262626;
    --text-white: #FFFFFF;
    --text-light: #E5E5E5;
    --text-gray: #B3B3B3;
    --canvas-w: 1920;
    --canvas-h: 1080;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0A;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .canvas {
    position: relative;
    width: calc(var(--canvas-w) * 1px);
    height: calc(var(--canvas-h) * 1px);
    background: var(--bg);
    transform-origin: top left;
    overflow: hidden;
  }

  /* ── Background ── */
  .bg {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  /* ── Hero Section ── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 840px;
  }

  /* ── Sine Wave ── */
  .sine-wave-container {
    width: 840px;
    height: 140px;
  }

  /* ── Game Title ── */
  .game-title {
    font-family: 'ZCOOL QingKe HuangYou', cursive;
    font-weight: 400;
    font-size: 68px;
    color: var(--text-white);
    text-align: center;
    width: 800px;
    height: 66px;
    line-height: 66px;
    /* 5-layer neon green glow */
    text-shadow:
      0 0 4px  rgba(158, 255, 0, 1),
      0 0 10px rgba(158, 255, 0, 0.8),
      0 0 20px rgba(158, 255, 0, 0.5),
      0 0 40px rgba(158, 255, 0, 0.25),
      0 0 80px rgba(158, 255, 0, 0.1);
  }

  /* ── Game Subtitle ── */
  .game-subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    color: var(--neon);
    text-align: center;
    width: 400px;
    line-height: 1;
  }

  /* ── Rotating Text Card ── */
  .rotating-card {
    width: 520px;
    height: 54px;
    padding: 16px;
    background: var(--card-dark);
    border: 1px solid var(--card-border-rot);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .rotating-text {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: var(--text-light);
    text-align: center;
    width: 100%;
    line-height: 1;
  }

  /* ── Button Spacer ── */
  .btn-spacer { height: 32px; width: 100%; }

  /* ── Buttons Row ── */
  .buttons-row {
    display: flex;
    gap: 24px;
    align-items: center;
    justify-content: center;
  }

  /* ── Card Base ── */
  .btn-card {
    width: 200px;
    height: 160px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 24px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
  }

  .btn-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }

  .btn-card:active {
    transform: translateY(0);
  }

  /* ── Challenge Card (Primary CTA) ── */
  .challenge-card {
    background: var(--neon);
  }

  .challenge-card:hover {
    box-shadow: 0 0 30px rgba(158, 255, 0, 0.4),
                0 8px 24px rgba(0, 0, 0, 0.3);
  }

  .challenge-card .card-icon svg * {
    stroke: #000;
    fill: #000;
  }

  .challenge-card .card-label { color: #000; }
  .challenge-card .card-desc  { color: #000; opacity: 0.5; }

  /* ── Room / Reward Cards (Secondary) ── */
  .room-card, .reward-card {
    background: var(--card-dark);
    border: 1px solid var(--card-border);
  }

  .room-card:hover, .reward-card:hover {
    border-color: var(--neon);
    box-shadow: 0 0 16px rgba(158, 255, 0, 0.15),
                0 8px 24px rgba(0, 0, 0, 0.3);
  }

  .room-card .card-icon svg *, .reward-card .card-icon svg * {
    fill: var(--text-white);
  }

  .room-card .card-label, .reward-card .card-label { color: var(--text-white); }
  .room-card .card-desc,  .reward-card .card-desc  { color: var(--text-gray); }

  /* ── Card Internals ── */
  .card-icon {
    width: 48px; height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-icon svg { width: 48px; height: 48px; }

  .card-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 20px;
    text-align: center;
    width: 100%;
    line-height: 1.2;
  }

  .card-desc {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 13px;
    text-align: center;
    width: 100%;
    line-height: 1.2;
  }

  /* ── Footer ── */
  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .website-link {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--neon);
    text-align: center;
    width: 100%;
    line-height: 1;
  }

  .copyright {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: var(--text-light);
    opacity: 0.5;
    text-align: center;
    width: 100%;
    line-height: 1;
  }
</style>
</head>
<body>

<div class="canvas" id="canvas">
  <div class="bg">
    <!-- Hero Section -->
    <div class="hero">

      <!-- Sine Wave SVG -->
      <div class="sine-wave-container">
        <svg width="840" height="140" viewBox="0 0 840 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Y-axis hint -->
          <line x1="26.25" y1="10" x2="26.25" y2="130" stroke="#9EFF00" stroke-opacity="0.12" stroke-width="1"/>
          <!-- X-axis dashed -->
          <line x1="26.25" y1="70" x2="813.75" y2="70" stroke="#9EFF00" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 8"/>
          <!-- Outer glow curve -->
          <path d="M 26.25,120 C 63,120 92.25,20 130.5,20 C 168.75,20 198,120 236.25,120 C 274.5,120 303.75,20 342,20 C 380.25,20 409.5,120 447.75,120 C 486,120 515.25,20 553.5,20 C 591.75,20 621,120 659.25,120 C 697.5,120 726.75,20 765,20 C 803.25,20 832.5,120 813.75,120"
                stroke="#9EFF00" stroke-opacity="0.10" stroke-width="14" stroke-linecap="round" fill="none"/>
          <!-- Main sine curve (4 cycles) -->
          <path d="M 26.25,120 C 63,120 92.25,20 130.5,20 C 168.75,20 198,120 236.25,120 C 274.5,120 303.75,20 342,20 C 380.25,20 409.5,120 447.75,120 C 486,120 515.25,20 553.5,20 C 591.75,20 621,120 659.25,120 C 697.5,120 726.75,20 765,20 C 803.25,20 832.5,120 813.75,120"
                stroke="#9EFF00" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- Title -->
      <h1 class="game-title">函数射线</h1>

      <!-- Subtitle -->
      <p class="game-subtitle">GRAPHRay</p>

      <!-- Rotating Text Card -->
      <div class="rotating-card">
        <span class="rotating-text" id="rotatingText">最公式化打法的游戏</span>
      </div>

      <!-- Spacer -->
      <div class="btn-spacer"></div>

      <!-- Buttons Row -->
      <div class="buttons-row">
        <!-- Challenge Card (Primary) -->
        <div class="btn-card challenge-card">
          <div class="card-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <path d="M20.8 10.4L17.2 -0.4Q17 -0.9 16.6 -1.1Q16.1 -1.4 15.6 -1.2Q15.3 -1.1 15.1 -0.9Q14.9 -0.6 14.8 -0.3L11 12.8L-0.1 13.8Q-0.6 13.8 -1 14.2Q-1.3 14.6 -1.2 15.1Q-1.2 15.5 -1 15.8Q-0.7 16.1 -0.4 16.2L8.4 18.8L4.8 29.6Q4.6 30.1 4.9 30.6Q5.1 31 5.6 31.2Q5.9 31.3 6.1 31.2Q6.4 31.2 6.6 31.1L14.4 26.4L12.8 37.8Q12.7 38.3 13 38.8Q13.3 39.2 13.8 39.2Q14.2 39.3 14.5 39.1Q14.8 39 15 38.7L22.6 27.3L35.8 29.2Q36.3 29.3 36.8 29Q37.2 28.7 37.2 28.2Q37.3 27.8 37.2 27.5Q37 27.2 36.8 27L27.6 19.7L33.1 8.6Q33.4 8.1 33.2 7.6Q33 7.1 32.6 6.9Q32.3 6.8 32.1 6.8Q31.8 6.7 31.6 6.8L20.8 10.4M16.1 4.2L18.8 12.4Q19 12.9 19.4 13.1Q19.9 13.4 20.4 13.2L29.5 10.1L24.9 19.4Q24.7 19.8 24.8 20.3Q24.9 20.7 25.2 21L31.6 26.1L22.2 24.8Q21.8 24.7 21.5 24.9Q21.2 25 21 25.3L16 32.7L17.2 24.2Q17.3 24 17.2 23.8Q17.2 23.5 17.1 23.4Q16.8 22.9 16.3 22.8Q15.8 22.6 15.4 22.9L8.3 27.2L11.2 18.4Q11.2 18.4 11.2 18.4Q11.2 18.4 11.2 18.4Q11.4 17.9 11.1 17.4Q10.9 16.9 10.4 16.8L6.7 15.7L12.1 15.2Q12.5 15.2 12.8 15Q13.1 14.7 13.2 14.3L16.1 4.2Z"
                    fill="#000" stroke="#000" stroke-width="0.5" fill-rule="evenodd"/>
            </svg>
          </div>
          <span class="card-label">闯关模式</span>
          <span class="card-desc">单人 · 关卡制</span>
        </div>

        <!-- Room Card -->
        <div class="btn-card room-card">
          <div class="card-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="18" cy="14" r="6" stroke="#FFF" stroke-width="2.5"/>
              <circle cx="30" cy="14" r="6" stroke="#FFF" stroke-width="2.5"/>
              <path d="M6 40C6 32 11 28 18 28" stroke="#FFF" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M42 40C42 32 37 28 30 28" stroke="#FFF" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="card-label">加入房间</span>
          <span class="card-desc">多人 · 联机对战</span>
        </div>

        <!-- Reward Card -->
        <div class="btn-card reward-card">
          <div class="card-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect x="6" y="18" width="36" height="24" rx="3" stroke="#FFF" stroke-width="2.5"/>
              <line x1="6" y1="18" x2="42" y2="18" stroke="#FFF" stroke-width="2.5"/>
              <line x1="24" y1="18" x2="24" y2="42" stroke="#FFF" stroke-width="2.5"/>
              <path d="M18 8L24 18L30 8" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="card-label">每日奖励</span>
          <span class="card-desc">签到 · 拿福利</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="website-link">zzyhub.cn</span>
      <span class="copyright">&copy; 2026 GraphRay</span>
    </div>
  </div>
</div>

<script>

// ── Canvas Scaling ──
(function() {
  var canvas = document.getElementById('canvas');
  var W = 1920, H = 1080;

  function scaleCanvas() {
    var scaleX = window.innerWidth  / W;
    var scaleY = window.innerHeight / H;
    var scale  = Math.min(scaleX, scaleY);
    var left   = (window.innerWidth  - W * scale) / 2;
    var top    = (window.innerHeight - H * scale) / 2;

    canvas.style.transform = 'scale(' + scale + ')';
    canvas.style.left  = left + 'px';
    canvas.style.top   = top  + 'px';
  }

  scaleCanvas();
  window.addEventListener('resize', scaleCanvas);
  window.addEventListener('orientationchange', function() {
    setTimeout(scaleCanvas, 100);
  });

  // ── Rotating Text Carousel ──
  var texts = [
    '最公式化打法的游戏',
    '你的函数，就是武器',
    '刻板印象中中国理科生会玩的游戏',
    '数学不好也能玩，数学好能玩更爽',
    '来自 zzyhub.cn 的奇怪作品'
  ];

  var rotatingEl = document.getElementById('rotatingText');
  var idx = 0;

  function rotateText() {
    rotatingEl.style.opacity = '0';
    rotatingEl.style.transition = 'opacity 0.4s ease';

    setTimeout(function() {
      idx = (idx + 1) % texts.length;
      rotatingEl.textContent = texts[idx];
      rotatingEl.style.opacity = '1';
    }, 400);
  }

  setInterval(rotateText, 3000);

  // ── Button Click Handlers ──
  document.querySelector('.challenge-card').addEventListener('click', function() {
    console.log('[GraphRay] → 闯关模式');
  });

  document.querySelector('.room-card').addEventListener('click', function() {
    console.log('[GraphRay] → 加入房间');
  });

  document.querySelector('.reward-card').addEventListener('click', function() {
    console.log('[GraphRay] → 每日奖励');
  });
})();
</script>

</body>
</html>
